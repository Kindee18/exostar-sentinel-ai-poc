name: Exostar Sentinel PoC - AI-Driven Security Remediation

on:
  push:
    branches: [ "main", "poc-demo" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze-and-remediate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Run AI-Driven Security Check
      run: |
        echo "[START] Starting AI Security Audit..."
        python3 scripts/remediate.py

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init & Validate
      run: |
        cd terraform
        terraform init -backend=false
        terraform validate
        echo "[SUCCESS] Infrastructure validation passed after remediation."
